name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Docker
              run: |
                  docker --version
                  docker compose --version

            - name: Start database
              run: docker compose up -d db

            - name: Wait for database to be ready
              run: |
                  timeout 60 bash -c 'until docker compose exec -T db mysqladmin ping --silent; do sleep 1; done'

            - name: Install Composer dependencies
              run: composer install --no-progress --prefer-dist --optimize-autoloader

            - name: Run tests
              run: docker compose run --rm tests bash -lc "bash ./tests/entrypoint.sh && wp plugin install woocommerce --activate --path=/tmp/wordpress --allow-root && vendor/bin/phpunit tests/ 2>&1 | grep -v -E 'SERIALIZATION_FORMAT|^There were [0-9]+ warnings|^[0-9]+\) Database'"

            - name: Stop services
              run: docker compose down
